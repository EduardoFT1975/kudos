<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Kudos – Cápsula Real</title>
<style>
  body {font-family: system-ui; background:#0a0a0f; color:#eee; margin:0; padding:30px;}
  .capsula {background:#1a1a2e; border-radius:20px; padding:30px; max-width:520px; margin:30px auto; box-shadow:0 20px 50px rgba(0,255,150,0.15);}
  h1 {text-align:center; color:#00ff9d; font-size:2.5em; margin-bottom:40px;}
  h2 {color:#00ff9d; margin:0 0 15px; font-size:1.8em;}
  .temas {margin:15px 0;}
  .tema {display:inline-block; background:#00ff9d; color:#000; padding:8px 16px; border-radius:25px; font-weight:bold; margin:5px;}
  img {width:100%; border-radius:15px; margin:20px 0;}
  audio {width:100%; margin:20px 0;}
  .mapa {height:250px; background:#16213e; border-radius:15px; display:flex; align-items:center; justify-content:center; color:#666; font-size:1.1em;}
</style>
</head>
<body>
<h1>Así verán los usuarios tus cápsulas</h1>

<div class="capsula">
  <h2>Museo del Prado</h2>
  <div class="temas">
    <span>Cultura</span><span>Historia</span><span>Arte</span><span>Patrimonio</span>
  </div>
  <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Museo_del_Prado_2016_(25185942199).jpg">
  <audio controls src="https://freesound.org/data/previews/620/620282_5674468-lq.mp3"></audio>
  <div class="mapa">Mapa interactivo 3D<br><small>40.4138, -3.6921 · Madrid</small></div>
</div>

<div class="capsula">
  <h2>Alhambra de Granada</h2>
  <div class="temas">
    <span>Arquitectura</span><span>Historia</span><span>Islam</span><span>UNESCO</span>
  </div>
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Alhambra_de_Granada_2014.jpg">
  <div class="mapa">Mapa interactivo 3D<br><small>37.1761, -3.5900 · Granada</small></div>
</div>

</body>
</html>

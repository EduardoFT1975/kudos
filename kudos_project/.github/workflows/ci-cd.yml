name: Kudos CI/CD

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
test:
runs-on: windows-latest
services:
postgres:
image: postgres:15
env:
POSTGRES_DB: kudos_test
POSTGRES_USER: kudos
POSTGRES_PASSWORD: kudos123
ports:

5432:5432 options: >- --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5 redis: image: redis:7.0 ports:
6379:6379 steps:
uses: actions/checkout@v4
name: Set up Python uses: actions/setup-python@v5 with: python-version: '3.8'
name: Install dependencies run: | python -m pip install --upgrade pip pip install -r requirements.txt
name: Run linting with Flake8 run: | pip install flake8 flake8 . --max-line-length=120 --exclude=venv,migrations
name: Run tests env: DATABASE_URL: postgres://kudos:kudos123@localhost:5432/kudos_test REDIS_URL: redis://localhost:6379/0 DJANGO_SETTINGS_MODULE: kudos_project.settings run: | python manage.py test
name: Upload coverage report uses: actions/upload-artifact@v4 with: name: coverage-report path: htmlcov/
deploy-staging:
needs: test
runs-on: windows-latest
if: github.event_name == 'push' && github.ref == 'refs/heads/main'
steps:

uses: actions/checkout@v4
name: Deploy to staging run: |
Copiar scripts de backup
Copy-Item -Path scripts/backups/*.ps1 -Destination C:\kudos\scripts\backups\
Configurar tareas programadas
powershell -File C:\kudos\scripts\backups\schedule_backup_tasks.ps1
Instalar dependencias
python -m pip install -r requirements.txt
Aplicar migraciones
python manage.py migrate
Recopilar archivos estßticos
python manage.py collectstatic --noinput
Reiniciar servicios (adaptar seg˙n configuraciˇn)

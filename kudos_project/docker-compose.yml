# docker-compose.yml

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile_app
    container_name: kudos_project-app-1
    volumes:
      - ./:/app
      - ./wait-for-it.sh:/app/wait-for-it.sh
    command: >
      sh -c "./wait-for-it.sh db:5432 --timeout=60 --strict -- echo 'Database is ready!' &&
             python3 manage.py migrate &&
             python3 manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - ipfs
      - solana
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  celery:
    build:
      context: .
      dockerfile: Dockerfile_app
    container_name: kudos_project-celery-1
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=kudos_project.settings
    depends_on:
      - app
      - redis
      - ipfs
      - solana
    command: celery -A kudos_project worker -l info --concurrency=4
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile_app
    container_name: kudos_project-celerybeat-1
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=kudos_project.settings
    depends_on:
      - app
      - redis
    command: celery -A kudos_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

  db:
    image: postgis/postgis:13-3.1
    container_name: kudos_project-db-1
    environment:
      - POSTGRES_USER=kudos_user
      - POSTGRES_PASSWORD=Po003785
      - POSTGRES_DB=kudos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres -c listen_addresses='*'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  redis:
    image: redis:6
    container_name: kudos_project-redis-1
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

  ipfs:
    image: ipfs/go-ipfs:v0.13.0
    container_name: kudos_project-ipfs-1
    volumes:
      - ipfs_data:/data/ipfs
    ports:
      - "5001:5001"
      - "8080:8080"
    environment:
      - IPFS_PROFILE=server
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  solana:
    image: solanalabs/solana:v1.18.0
    container_name: kudos_project-solana-1
    command: solana-test-validator --rpc-port 8899
    ports:
      - "8899:8899"
      - "9900:9900"
    volumes:
      - solana_data:/root/.solana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  ar_vr:
    image: node:18
    container_name: kudos_project-arvr-1
    working_dir: /app
    volumes:
      - ./ar_vr:/app
    command: >
      sh -c "npm install aframe@1.7.1 express node-fetch@2 ipfs-http-client &&
             node server.js"
    ports:
      - "3000:3000"
    depends_on:
      - app
      - ipfs
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  translator:
    image: python:3.9
    container_name: kudos_project-translator-1
    working_dir: /app
    volumes:
      - ./translator:/app
    env_file:
      - .env
    command: >
      sh -c "pip install deep-translator &&
             python translator.py"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

  test:
    build:
      context: .
      dockerfile: Dockerfile_app
    container_name: kudos_project-test-1
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_SETTINGS_MODULE=kudos_project.settings
      - POSTGRES_USER=kudos_user
      - POSTGRES_PASSWORD=Po003785
      - POSTGRES_DB=kudos_db
    command: pytest kudos_app/tests.py
    depends_on:
      - db
      - redis
      - app
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  monitoring:
    image: prom/prometheus:v2.44.0
    container_name: kudos_project-monitoring-1
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    depends_on:
      - app
      - celery
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M

volumes:
  postgres_data:
  ipfs_data:
  solana_data:
  prometheus_data:
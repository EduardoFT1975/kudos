# KUDOS · Render blueprint
# Define 2 servicios:
#   - kudos-frontend (Next.js · ya existente en Render)
#   - kudos-api-v2 (NUEVO · FastAPI Capsule Engine v2)
#
# Después de hacer push de este archivo:
#   1) Ir a https://dashboard.render.com/blueprints
#   2) Click "New Blueprint Instance"
#   3) Conectar este repo · Render detectará render.yaml
#   4) Render creará kudos-api-v2 automáticamente
#   5) Copiar la URL pública del nuevo servicio
#   6) En kudos-frontend → Settings → Environment Variables:
#        NEXT_PUBLIC_KUDOS_API_URL=https://kudos-api-v2.onrender.com
#   7) Redeploy frontend

services:
  # ─── Backend FastAPI · Capsule Engine v2 ──────────────────────
  - type: web
    name: kudos-api-v2
    runtime: docker
    repo: https://github.com/EduardoFT1975/kudos
    branch: master
    dockerfilePath: ./kudos_engine/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "10000"

# render.yaml – Configuración automática para Render.com
# Si subes el proyecto a GitHub y conectas Render, este archivo
# crea automáticamente el servicio + base de datos PostgreSQL.

services:
  - type: web
    name: kudos
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn kudos_project.wsgi:application"
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        fromDatabase:
          name: kudos-db
          property: connectionString

databases:
  - name: kudos-db
    plan: free

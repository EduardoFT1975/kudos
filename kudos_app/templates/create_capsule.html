{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Crear Cápsula - Kudos</title>
</head>
<body>
    <h1>Crear una Nueva Cápsula</h1>
    <form method="post">
        {% csrf_token %}
        <p><label>Contenido:</label><br>
        <textarea name="contenido" rows="5" cols="50" required></textarea></p>
        <p><label>Modo:</label><br>
        <select name="modo" required>
            {% for modo in modos %}
                <option value="{{ modo }}">{{ modo }}</option>
            {% endfor %}
        </select></p>
        <p><label>Temas (selecciona uno o más):</label><br>
        <select name="temas" multiple>
            {% for tema in temas %}
                <option value="{{ tema }}">{{ tema }}</option>
            {% endfor %}
        </select></p>
        <p><label>Privacidad:</label><br>
        <select name="privacy">
            <option value="publico">Público</option>
            <option value="solo_yo">Solo Yo</option>
            <option value="familia">Familia</option>
            <option value="amigos">Amigos</option>
        </select></p>
        <p><label>Latitud:</label><br>
        <input type="number" step="any" name="latitude" value="0"></p>
        <p><label>Longitud:</label><br>
        <input type="number" step="any" name="longitude" value="0"></p>
        <p><label>Nivel Educativo (si aplica):</label><br>
        <select name="educational_level">
            <option value="">Ninguno</option>
            <option value="Básico">Básico</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
        </select></p>
        <button type="submit">Crear Cápsula</button>
    </form>
    <p><a href="{% url 'control_panel' %}">Volver al Panel</a></p>
</body>
</html>

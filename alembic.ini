# KUDOS · Alembic configuration · T1.2 Postgres Foundation
# DATABASE_URL leida desde env (no hardcoded aqui).
# Para correr migraciones:
#   alembic upgrade head        # aplica todas
#   alembic downgrade -1        # rollback ultima
#   alembic revision --autogenerate -m "descripcion"

[alembic]
script_location = kudos_engine/db/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión - Kudos</title>
</head>
<body>
    <h1>Iniciar Sesión</h1>
    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <p><label>UID:</label><input type="text" name="username" required></p>
        <p><label>Contraseña:</label><input type="password" name="password" required></p>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <a href="{% url 'control_panel' %}">Volver al Panel</a>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión - Kudos</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    {% if form.errors %}
        <p>Nombre de usuario o contraseña incorrectos. Por favor, intenta de nuevo.</p>
    {% endif %}
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <table>
            {{ form.as_table }}
        </table>
        <button type="submit">Iniciar Sesión</button>
    </form>
    <p><a href="{% url 'home' %}">Volver al inicio</a></p>
</body>
</html>

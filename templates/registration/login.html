{% extends 'base.html' %}

{% block title %}Entrar – Kudos{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Iniciar sesión</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="message message-error">UID o contraseña incorrectos.</div>
        {% endif %}
        <label>UID
            <input type="text" name="username" required autofocus>
        </label>
        <label>Contraseña
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="btn btn-gold">Entrar</button>
        <input type="hidden" name="next" value="{{ next }}">
    </form>
    <p class="muted center">¿No tienes cuenta? <a href="{% url 'register' %}">Crea una</a>.</p>
</div>
{% endblock %}
